<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%" role="img" aria-label="i18n-sharpen translation linter, sync, and prune flow illustration">
  <defs>
    <!-- Shadow Filter with CSS Variables -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="var(--shadow-opacity)" />
    </filter>

    <!-- Glow Gradients -->
    <linearGradient id="amber-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="var(--glow-opacity)"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="var(--glow-opacity)"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="var(--grid-color)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <style>
    :root {
      --bg-color: #f8fafc;
      --grid-color: rgba(226, 232, 240, 0.8);
      --panel-bg: #ffffff;
      --panel-border: #e2e8f0;
      --shadow-opacity: 0.06;
      --glow-opacity: 0.08;
      
      --btn-red: #ff5f56;
      --btn-yellow: #ffbd2e;
      --btn-green: #27c93f;
      --btn-gray: #e2e8f0;
      
      --text-main: #334155;
      --text-muted: #64748b;
      --text-comment: #94a3b8;
      
      --syn-kw: #d73a49;
      --syn-fn: #6f42c1;
      --syn-str: #032f62;
      --syn-val: #22863a;
      --syn-tag: #005cc5;
      --syn-punct: #24292e;
      
      --sync-bg: rgba(34, 197, 94, 0.06);
      --sync-border: rgba(34, 197, 94, 0.25);
      --sync-text: #166534;
      
      --prune-bg: rgba(239, 68, 68, 0.05);
      --prune-border: rgba(239, 68, 68, 0.2);
      --prune-text: #991b1b;
      
      --warning-bg: rgba(245, 158, 11, 0.06);
      --warning-border: rgba(245, 158, 11, 0.25);
      --warning-text: #b45309;
      
      --pipeline-line: #e2e8f0;
      
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0b0f19;
        --grid-color: rgba(30, 41, 59, 0.4);
        --panel-bg: #0d1117;
        --panel-border: #21262d;
        --shadow-opacity: 0.35;
        --glow-opacity: 0.12;
        
        --btn-gray: #30363d;
        
        --text-main: #c9d1d9;
        --text-muted: #8b949e;
        --text-comment: #6e7681;
        
        --syn-kw: #ff7b72;
        --syn-fn: #d2a8ff;
        --syn-str: #a5d6ff;
        --syn-val: #7ee787;
        --syn-tag: #7ee787;
        --syn-punct: #c9d1d9;
        
        --sync-bg: rgba(16, 185, 129, 0.1);
        --sync-border: rgba(16, 185, 129, 0.3);
        --sync-text: #34d399;
        
        --prune-bg: rgba(239, 68, 68, 0.1);
        --prune-border: rgba(239, 68, 68, 0.3);
        --prune-text: #f87171;
        
        --warning-bg: rgba(245, 158, 11, 0.1);
        --warning-border: rgba(245, 158, 11, 0.3);
        --warning-text: #fbbf24;
        
        --pipeline-line: #21262d;
      }
    }
  </style>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="var(--bg-color)" rx="16" stroke="var(--panel-border)" stroke-width="1"/>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <!-- Glowing background blobs -->
  <circle cx="150" cy="180" r="130" fill="url(#amber-glow)" filter="blur(35px)" />
  <circle cx="450" cy="180" r="130" fill="url(#green-glow)" filter="blur(35px)" />

  <!-- LEFT PANEL: Code Editor (SOURCE CODE) -->
  <g transform="translate(25, 30)" filter="url(#shadow)">
    <!-- Main Window Card -->
    <rect width="250" height="290" rx="10" fill="var(--panel-bg)" stroke="var(--panel-border)" stroke-width="1.2"/>
    
    <!-- Window Header -->
    <circle cx="16" cy="16" r="4" fill="var(--btn-red)"/>
    <circle cx="28" cy="16" r="4" fill="var(--btn-yellow)"/>
    <circle cx="40" cy="16" r="4" fill="var(--btn-green)"/>
    <text x="125" y="20" fill="var(--text-muted)" font-family="var(--font-sans)" font-size="10.5" font-weight="600" text-anchor="middle" letter-spacing="0.5">App.tsx</text>
    <line x1="0" y1="32" x2="250" y2="32" stroke="var(--panel-border)" stroke-width="1.2"/>
    
    <!-- Editor Contents -->
    <g transform="translate(0, 32)">
      <!-- Gutter vertical divider -->
      <line x1="28" y1="0" x2="28" y2="258" stroke="var(--panel-border)" stroke-width="0.8" stroke-dasharray="2,2"/>
      
      <!-- Line Numbers -->
      <g font-family="var(--font-mono)" font-size="9.5" fill="var(--text-comment)" text-anchor="middle">
        <text x="14" y="22">1</text>
        <text x="14" y="44">2</text>
        <text x="14" y="66">3</text>
        <text x="14" y="88">4</text>
        <text x="14" y="110">5</text>
        <text x="14" y="132">6</text>
        <text x="14" y="154">7</text>
        <text x="14" y="176">8</text>
        <text x="14" y="198">9</text>
      </g>
      
      <!-- Code lines -->
      <g font-family="var(--font-mono)" font-size="10.5">
        <!-- Line 1: const Hero = () => { -->
        <text x="36" y="22"><tspan fill="var(--syn-kw)">const</tspan> <tspan fill="var(--syn-fn)">Hero</tspan> <tspan fill="var(--syn-punct)">= () =&gt; {</tspan></text>
        
        <!-- Line 2: // 1. Translation Keys -->
        <text x="36" y="44" fill="var(--text-comment)">  // 1. Translation Keys</text>
        
        <!-- Line 3: t("hero.title") -->
        <text x="36" y="66"><tspan fill="var(--syn-fn)">  t</tspan><tspan fill="var(--syn-punct)">(</tspan><tspan fill="var(--syn-str)">"hero.title"</tspan><tspan fill="var(--syn-punct)">)</tspan></text>
        
        <!-- Line 4: t("hero.subtitle") -->
        <text x="36" y="88"><tspan fill="var(--syn-fn)">  t</tspan><tspan fill="var(--syn-punct)">(</tspan><tspan fill="var(--syn-str)">"hero.subtitle"</tspan><tspan fill="var(--syn-punct)">)</tspan></text>
        
        <!-- Line 5: t("hero.cta") (Highlighted as Warning/New) -->
        <rect x="32" y="97" width="210" height="20" rx="4" fill="var(--warning-bg)" stroke="var(--warning-border)" stroke-width="1"/>
        <text x="36" y="110" font-weight="500"><tspan fill="var(--syn-fn)">  t</tspan><tspan fill="var(--syn-punct)">(</tspan><tspan fill="var(--warning-text)">"hero.cta"</tspan><tspan fill="var(--syn-punct)">)</tspan></text>
        <circle cx="232" cy="105" r="6" fill="var(--warning-border)" />
        <text x="232" y="108" fill="var(--warning-text)" font-family="var(--font-sans)" font-size="8.5" font-weight="bold" text-anchor="middle">!</text>
        
        <!-- Line 6: // 2. Hardcoded Warnings -->
        <text x="36" y="132" fill="var(--text-comment)">  // 2. Hardcoded Warnings</text>
        
        <!-- Line 7: <span>Submit</span> (Highlighted Red Warning) -->
        <rect x="32" y="141" width="210" height="20" rx="4" fill="var(--prune-bg)" stroke="var(--prune-border)" stroke-width="1"/>
        <text x="36" y="154"><tspan fill="var(--syn-punct)">&lt;</tspan><tspan fill="var(--syn-tag)">span</tspan><tspan fill="var(--syn-punct)">&gt;</tspan><tspan fill="var(--prune-text)" font-weight="600">Submit</tspan><tspan fill="var(--syn-punct)">&lt;/</tspan><tspan fill="var(--syn-tag)">span</tspan><tspan fill="var(--syn-punct)">&gt;</tspan></text>
        <circle cx="232" cy="149" r="6" fill="var(--prune-border)" />
        <text x="232" y="152" fill="var(--prune-text)" font-family="var(--font-sans)" font-size="8.5" font-weight="bold" text-anchor="middle">!</text>
        
        <!-- Line 8: }; -->
        <text x="36" y="176" fill="var(--syn-punct)">};</text>
      </g>
    </g>

    <!-- Source Label -->
    <rect x="16" y="255" width="85" height="20" rx="4" fill="var(--panel-border)" opacity="0.3"/>
    <text x="58.5" y="268" fill="var(--text-muted)" font-family="var(--font-sans)" font-size="9.5" font-weight="600" text-anchor="middle">SOURCE CODE</text>
  </g>

  <!-- MIDDLE PIPELINE: Sync & Prune Flow Visualizations -->
  <g>
    <!-- Central Pipeline Track -->
    <line x1="300" y1="45" x2="300" y2="315" stroke="var(--pipeline-line)" stroke-width="1.5" stroke-dasharray="4,4"/>
    
    <!-- SYNC FLOW -->
    <!-- Connection Curve (Left missing key -> Right synced value) -->
    <path d="M 275,164 C 290,164 310,142 325,142" fill="none" stroke="var(--sync-text)" stroke-width="2" opacity="0.8"/>
    <path d="M 321,138 L 325,142 L 321,146" fill="none" stroke="var(--sync-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sync badge -->
    <g transform="translate(300, 153)">
      <rect x="-22" y="-10" width="44" height="20" rx="10" fill="var(--panel-bg)" stroke="var(--sync-text)" stroke-width="1.2"/>
      <text x="0" y="3" fill="var(--sync-text)" font-family="var(--font-sans)" font-size="8" font-weight="800" text-anchor="middle" letter-spacing="0.5">SYNC</text>
    </g>

    <!-- PRUNE FLOW -->
    <!-- Connection Curve (Right pruned key -> Prune timeline step) -->
    <path d="M 325,164 C 315,164 305,205 300,205" fill="none" stroke="var(--prune-text)" stroke-width="1.8" stroke-dasharray="3,3" opacity="0.8"/>
    
    <!-- Prune badge -->
    <g transform="translate(300, 205)">
      <rect x="-24" y="-10" width="48" height="20" rx="10" fill="var(--panel-bg)" stroke="var(--prune-text)" stroke-width="1.2"/>
      <text x="0" y="3" fill="var(--prune-text)" font-family="var(--font-sans)" font-size="8" font-weight="800" text-anchor="middle" letter-spacing="0.5">PRUNE</text>
    </g>

    <!-- LINT FLOW -->
    <!-- Connection Curve (Left hardcoded text -> Lint timeline step) -->
    <path d="M 275,208 C 285,208 295,250 300,250" fill="none" stroke="var(--warning-text)" stroke-width="1.8" stroke-dasharray="3,3" opacity="0.8"/>
    
    <!-- Lint badge -->
    <g transform="translate(300, 250)">
      <rect x="-24" y="-10" width="48" height="20" rx="10" fill="var(--panel-bg)" stroke="var(--warning-text)" stroke-width="1.2"/>
      <text x="0" y="3" fill="var(--warning-text)" font-family="var(--font-sans)" font-size="8" font-weight="800" text-anchor="middle" letter-spacing="0.5">LINT</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Locale JSON (LOCALE JSON) -->
  <g transform="translate(325, 30)" filter="url(#shadow)">
    <!-- Main Window Card -->
    <rect width="250" height="290" rx="10" fill="var(--panel-bg)" stroke="var(--panel-border)" stroke-width="1.2"/>
    
    <!-- Window Header -->
    <circle cx="16" cy="16" r="4" fill="var(--btn-gray)"/>
    <circle cx="28" cy="16" r="4" fill="var(--btn-gray)"/>
    <circle cx="40" cy="16" r="4" fill="var(--btn-gray)"/>
    <text x="125" y="20" fill="var(--text-muted)" font-family="var(--font-sans)" font-size="10.5" font-weight="600" text-anchor="middle" letter-spacing="0.5">en.json</text>
    <line x1="0" y1="32" x2="250" y2="32" stroke="var(--panel-border)" stroke-width="1.2"/>
    
    <!-- Editor Contents -->
    <g transform="translate(0, 32)">
      <!-- Gutter vertical divider -->
      <line x1="28" y1="0" x2="28" y2="258" stroke="var(--panel-border)" stroke-width="0.8" stroke-dasharray="2,2"/>
      
      <!-- Line Numbers -->
      <g font-family="var(--font-mono)" font-size="9.5" fill="var(--text-comment)" text-anchor="middle">
        <text x="14" y="22">1</text>
        <text x="14" y="44">2</text>
        <text x="14" y="66">3</text>
        <text x="14" y="88">4</text>
        <text x="14" y="110">5</text>
        <text x="14" y="132">6</text>
        <text x="14" y="154">7</text>
      </g>
      
      <!-- Code lines -->
      <g font-family="var(--font-mono)" font-size="10.5">
        <!-- Line 1: { -->
        <text x="36" y="22" fill="var(--syn-punct)">{</text>
        
        <!-- Line 2: "hero.title": "Welcome", -->
        <text x="36" y="44"><tspan fill="var(--syn-str)">  "hero.title"</tspan><tspan fill="var(--syn-punct)">: </tspan><tspan fill="var(--syn-val)">"Welcome"</tspan><tspan fill="var(--syn-punct)">,</tspan></text>
        
        <!-- Line 3: "hero.subtitle": "Hello", -->
        <text x="36" y="66"><tspan fill="var(--syn-str)">  "hero.subtitle"</tspan><tspan fill="var(--syn-punct)">: </tspan><tspan fill="var(--syn-val)">"Hello"</tspan><tspan fill="var(--syn-punct)">,</tspan></text>
        
        <!-- Line 4: "hero.cta": "Get Started", (Synced key, highlighted green) -->
        <rect x="32" y="75" width="210" height="20" rx="4" fill="var(--sync-bg)" stroke="var(--sync-border)" stroke-width="1"/>
        <text x="36" y="88" font-weight="500"><tspan fill="var(--sync-text)">  "hero.cta"</tspan><tspan fill="var(--syn-punct)">: </tspan><tspan fill="var(--syn-val)">"Get Started"</tspan><tspan fill="var(--syn-punct)">,</tspan></text>
        <circle cx="232" cy="83" r="6" fill="var(--sync-border)" />
        <text x="232" y="86" fill="var(--sync-text)" font-family="var(--font-sans)" font-size="9" font-weight="bold" text-anchor="middle">+</text>
        
        <!-- Line 5: "old.key": "value" (Pruned key, highlighted red and crossed out) -->
        <rect x="32" y="97" width="210" height="20" rx="4" fill="var(--prune-bg)" stroke="var(--prune-border)" stroke-width="1"/>
        <text x="36" y="110" fill="var(--text-muted)" text-decoration="line-through"><tspan fill="var(--prune-text)" opacity="0.8">  "old.key"</tspan><tspan fill="var(--syn-punct)">: </tspan><tspan fill="var(--syn-val)" opacity="0.8">"value"</tspan></text>
        <circle cx="232" cy="105" r="6" fill="var(--prune-border)" />
        <text x="232" y="108" fill="var(--prune-text)" font-family="var(--font-sans)" font-size="9" font-weight="bold" text-anchor="middle">−</text>
        
        <!-- Line 6: ... -->
        <text x="36" y="132" fill="var(--text-comment)">  ...</text>
        
        <!-- Line 7: } -->
        <text x="36" y="154" fill="var(--syn-punct)">}</text>
      </g>
    </g>

    <!-- Output Label -->
    <rect x="16" y="255" width="85" height="20" rx="4" fill="var(--panel-border)" opacity="0.3"/>
    <text x="58.5" y="268" fill="var(--text-muted)" font-family="var(--font-sans)" font-size="9.5" font-weight="600" text-anchor="middle">LOCALE JSON</text>
  </g>
</svg>
