<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="100%" height="100%" role="img" aria-label="i18n-sharpen CLI validate terminal output">
  <defs>
    <linearGradient id="term-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#05070B"/>
    </linearGradient>
  </defs>

  <!-- Background Glow -->
  <rect width="100%" height="100%" fill="#070A0F"/>
  <circle cx="260" cy="150" r="160" fill="#EF4444" fill-opacity="0.04" filter="blur(40px)"/>
  <circle cx="100" cy="100" r="120" fill="#F59E0B" fill-opacity="0.04" filter="blur(50px)"/>

  <!-- Terminal Window -->
  <g transform="translate(10, 10)">
    <!-- Terminal Outer Shadow/Border -->
    <rect x="-1" y="-1" width="502" height="282" rx="10" fill="none" stroke="#1F2937" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Terminal Body -->
    <rect width="500" height="280" rx="9" fill="url(#term-bg)" stroke="#111827" stroke-width="1.5"/>

    <!-- Terminal Header (macOS style) -->
    <rect width="500" height="30" rx="9" fill="#111827"/>
    <!-- Crop bottom corners of header to keep main body rect clean -->
    <rect y="20" width="500" height="10" fill="#111827"/>
    
    <!-- Window controls -->
    <circle cx="18" cy="15" r="4.5" fill="#FF5F56"/>
    <circle cx="30" cy="15" r="4.5" fill="#FFBD2E"/>
    <circle cx="42" cy="15" r="4.5" fill="#27C93F"/>
    
    <!-- Window Title -->
    <text x="250" y="19" fill="#9CA3AF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" font-weight="500">terminal — i18n-sharpen validate</text>

    <!-- CLI Text Output -->
    <g transform="translate(20, 52)" font-family="'JetBrains Mono', 'Fira Code', Monaco, Consolas, monospace" font-size="11.5" letter-spacing="-0.1" line-height="1.5">
      <!-- Command input -->
      <text x="0" y="15">
        <tspan fill="#34D399" font-weight="bold">$</tspan>
        <tspan fill="#F3F4F6"> npx i18n-sharpen validate</tspan>
      </text>

      <!-- Tool Header -->
      <text x="0" y="40" fill="#6B7280" font-weight="bold">🔍 i18n-sharpen validator v0.4.4</text>
      
      <!-- Scan details -->
      <text x="0" y="60" fill="#9CA3AF">Loaded default language <tspan fill="#38BDF8">'en'</tspan> with <tspan fill="#34D399">124 keys</tspan>.</text>
      <text x="0" y="76" fill="#9CA3AF">Scanning directory: <tspan fill="#E5E7EB">src/</tspan> (<tspan fill="#34D399">15 source files</tspan>)</text>
      
      <!-- Validation results - Missing Keys -->
      <text x="0" y="105" fill="#F87171" font-weight="bold">✖ Missing translation keys (1):</text>
      <!-- Red dot bullet and details -->
      <text x="12" y="125">
        <tspan fill="#EF4444">-</tspan>
        <tspan fill="#F59E0B"> home.cta_button</tspan>
        <tspan fill="#6B7280"> (src/components/Hero.tsx:14)</tspan>
      </text>

      <!-- Validation results - Placeholders -->
      <text x="0" y="155" fill="#FBBF24" font-weight="bold">⚠ Active placeholder keys (1):</text>
      <!-- Yellow dot bullet and details -->
      <text x="12" y="175">
        <tspan fill="#F59E0B">-</tspan>
        <tspan fill="#E5E7EB"> button.submit</tspan>
        <tspan fill="#6B7280"> (value matches keypath in vi.json)</tspan>
      </text>

      <!-- Divider line -->
      <line x1="0" y1="202" x2="460" y2="202" stroke="#1F2937" stroke-width="1"/>

      <!-- Final status error -->
      <text x="0" y="222" fill="#F87171" font-weight="bold">Validation failed.</text>
      <text x="0" y="238" fill="#9CA3AF">Please fix the missing keys or active placeholders before committing.</text>
    </g>
  </g>
</svg>
