<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="100%" height="100%" role="img" aria-label="i18n-sharpen developer hero illustration">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8FB4CE"/>
      <stop offset="42%" stop-color="#E3EFF7"/>
      <stop offset="50%" stop-color="#FBFEFF"/>
      <stop offset="58%" stop-color="#DCEAF4"/>
      <stop offset="100%" stop-color="#9CC0D8"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8D784"/>
      <stop offset="50%" stop-color="#E7B23F"/>
      <stop offset="100%" stop-color="#C98A1E"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2A313C"/>
      <stop offset="50%" stop-color="#171C24"/>
      <stop offset="100%" stop-color="#0E1218"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#21262D" stroke-width="0.8" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#070A0F"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Glowing background elements -->
  <circle cx="160" cy="180" r="140" fill="url(#amber-glow)" filter="blur(40px)" />
  <circle cx="420" cy="200" r="120" fill="#1F2937" fill-opacity="0.2" filter="blur(50px)" />

  <!-- Code Window Mockup (Left Side) -->
  <g transform="translate(30, 40)">
    <!-- Shadow & Glow -->
    <rect x="-2" y="-2" width="284" height="324" rx="14" fill="none" stroke="#B45309" stroke-opacity="0.15" stroke-width="3" />
    <!-- Main Window -->
    <rect width="280" height="320" rx="12" fill="url(#panel-bg)" stroke="#30363D" stroke-width="1.5"/>
    <!-- Window Header -->
    <circle cx="16" cy="16" r="5" fill="#FF5F56"/>
    <circle cx="28" cy="16" r="5" fill="#FFBD2E"/>
    <circle cx="40" cy="16" r="5" fill="#27C93F"/>
    <text x="140" y="20" fill="#8B949E" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="500" letter-spacing="0.5">App.tsx</text>
    
    <!-- Code Editor Content -->
    <g transform="translate(15, 45)" font-family="'JetBrains Mono', monospace" font-size="11" line-height="1.5">
      <!-- Line Numbers -->
      <g fill="#484F58" font-size="10">
        <text x="0" y="15">1</text>
        <text x="0" y="35">2</text>
        <text x="0" y="55">3</text>
        <text x="0" y="75">4</text>
        <text x="0" y="95">5</text>
        <text x="0" y="115">6</text>
        <text x="0" y="135">7</text>
        <text x="0" y="155">8</text>
        <text x="0" y="175">9</text>
        <text x="0" y="195">10</text>
        <text x="0" y="215">11</text>
      </g>
      
      <!-- Code lines -->
      <g transform="translate(20, 0)">
        <text x="0" y="15"><tspan fill="#FF7B72">import</tspan> <tspan fill="#C9D1D9">{</tspan> <tspan fill="#79C0FF">t</tspan> <tspan fill="#C9D1D9">}</tspan> <tspan fill="#FF7B72">from</tspan> <tspan fill="#A5D6FF">"i18next"</tspan><tspan fill="#C9D1D9">;</tspan></text>
        
        <text x="0" y="35"><tspan fill="#FF7B72">export</tspan> <tspan fill="#FF7B72">const</tspan> <tspan fill="#D2A8FF">Hero</tspan> <tspan fill="#FF7B72">=</tspan> <tspan fill="#C9D1D9">()</tspan> <tspan fill="#FF7B72">=&gt;</tspan> <tspan fill="#C9D1D9">{</tspan></text>
        <text x="15" y="55"><tspan fill="#FF7B72">return</tspan> <tspan fill="#C9D1D9">(</tspan></text>
        <text x="30" y="75"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">div</tspan> <tspan fill="#79C0FF">className</tspan><tspan fill="#FF7B72">=</tspan><tspan fill="#A5D6FF">"hero"</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        
        <!-- Used key 1 -->
        <text x="45" y="95"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">h1</tspan><tspan fill="#79C0FF">&gt;</tspan><tspan fill="#C9D1D9">{</tspan><tspan fill="#D2A8FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#A5D6FF">"hero.title"</tspan><tspan fill="#C9D1D9">)}</tspan><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">h1</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        
        <!-- Used key 2 (Unused/Pruned indicator in code) -->
        <text x="45" y="115"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">p</tspan><tspan fill="#79C0FF">&gt;</tspan><tspan fill="#C9D1D9">{</tspan><tspan fill="#D2A8FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#A5D6FF">"hero.desc"</tspan><tspan fill="#C9D1D9">)}</tspan><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">p</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        
        <!-- Missing key (glowing highlight) -->
        <rect x="42" y="123" width="170" height="18" fill="#F59E0B" fill-opacity="0.12" rx="3" />
        <text x="45" y="135"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">button</tspan><tspan fill="#79C0FF">&gt;</tspan><tspan fill="#C9D1D9">{</tspan><tspan fill="#D2A8FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#F59E0B" font-weight="bold">"hero.cta"</tspan><tspan fill="#C9D1D9">)}</tspan><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">button</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        
        <!-- Hardcoded text warning -->
        <rect x="42" y="143" width="135" height="18" fill="#F85149" fill-opacity="0.08" rx="3" />
        <text x="45" y="155"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">span</tspan><tspan fill="#79C0FF">&gt;</tspan><tspan fill="#F85149">Hardcoded</tspan><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">span</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        
        <text x="30" y="175"><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">div</tspan><tspan fill="#79C0FF">&gt;</tspan></text>
        <text x="15" y="195"><tspan fill="#C9D1D9">);</tspan></text>
        <text x="0" y="215"><tspan fill="#C9D1D9">};</tspan></text>
      </g>
    </g>

    <!-- Scan overlay banner -->
    <g transform="translate(15, 275)">
      <rect width="250" height="32" rx="6" fill="#1F2937" fill-opacity="0.8" stroke="#374151" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#22C55E">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="20" fill="#34D399" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" letter-spacing="0.5">AST ANALYZER ACTIVE</text>
    </g>
  </g>

  <!-- Interactive Sync/Prune Visual (Right Side) -->
  <g transform="translate(340, 40)">
    <!-- Locale File Window -->
    <rect width="190" height="320" rx="12" fill="url(#panel-bg)" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="5" fill="#444D56" opacity="0.5"/>
    <circle cx="28" cy="16" r="5" fill="#444D56" opacity="0.5"/>
    <circle cx="40" cy="16" r="5" fill="#444D56" opacity="0.5"/>
    <text x="95" y="20" fill="#8B949E" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="500" letter-spacing="0.5">en.json</text>

    <!-- JSON Structure -->
    <g transform="translate(20, 50)" font-family="'JetBrains Mono', monospace" font-size="11">
      <text x="0" y="15" fill="#FF7B72">{</text>
      
      <!-- Existing translation -->
      <text x="15" y="35"><tspan fill="#79C0FF">"hero.title"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"Welcome!"</tspan><tspan fill="#C9D1D9">,</tspan></text>
      <text x="15" y="55"><tspan fill="#79C0FF">"hero.desc"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"Fast linter..."</tspan><tspan fill="#C9D1D9">,</tspan></text>
      
      <!-- Missing key synced (green highlight) -->
      <g>
        <rect x="12" y="67" width="160" height="20" fill="#2EA043" fill-opacity="0.15" rx="3"/>
        <text x="15" y="81" font-weight="bold"><tspan fill="#34D399">"hero.cta"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"hero.cta"</tspan></text>
        <text x="150" y="81" fill="#34D399" font-size="9" font-weight="bold">+</text>
      </g>
      
      <text x="15" y="105" fill="#C9D1D9" opacity="0.3">...</text>

      <!-- Dead key / Unused key pruned (red strike-through and warning) -->
      <g transform="translate(0, 55)">
        <rect x="12" y="67" width="160" height="20" fill="#F85149" fill-opacity="0.12" rx="3"/>
        <text x="15" y="81" fill="#8B949E" opacity="0.6" text-decoration="line-through"><tspan fill="#F85149">"old_key"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"Obsolete"</tspan></text>
        <text x="150" y="81" fill="#F85149" font-size="10" font-weight="bold">-</text>
      </g>

      <text x="0" y="300" fill="#FF7B72">}</text>
    </g>

    <!-- Connection Indicator -->
    <path d="M -30,125 C -5,125 -10,125 15,125" stroke="#34D399" stroke-width="1.5" stroke-dasharray="4,4" fill="none"/>
    <!-- Connection Indicator for Pruning -->
    <path d="M -30,200 C -5,200 -10,200 15,200" stroke="#F85149" stroke-width="1.5" stroke-dasharray="4,4" fill="none"/>
  </g>

  <!-- Central Sharp Tanto Dagger Logo (The "i18n-sharpen" Tool) -->
  <g transform="translate(280, 200) scale(1.3) rotate(-15)">
    <!-- Ambient Shadow -->
    <path d="M 9,-118 L 15,-111 L 9,-104 L 3,-111 Z" fill="#000" opacity="0.3" filter="blur(6px)" transform="translate(4,4)"/>
    <rect x="-1.5" y="-32" width="21" height="9.5" rx="3" fill="#000" opacity="0.3" filter="blur(6px)" transform="translate(4,4)"/>
    <path d="M 4,-31 L 14,-31 L 14,-86 L 8,-100 L 4,-80 Z" fill="#000" opacity="0.3" filter="blur(6px)" transform="translate(4,4)"/>

    <!-- The Tanto Dagger -->
    <g>
      <!-- Grip -->
      <rect x="4" y="-22" width="10" height="20" rx="2.5" fill="url(#grip)" stroke="#0C1118" stroke-width="1.2"/>
      <path d="M5,-6 L13,-12 M5,-12 L13,-18" stroke="url(#goldG)" stroke-width="1.4" opacity="0.85"/>
      
      <!-- Guard -->
      <rect x="-1.5" y="-32" width="21" height="9.5" rx="3" fill="url(#goldG)" stroke="#1B2330" stroke-width="1.6"/>
      <circle cx="9" cy="-27.2" r="1.7" fill="#1B2330" opacity="0.55"/>
      
      <!-- Blade (Steel) -->
      <path d="M4,-31 L14,-31 L14,-86 L8,-100 L4,-80 Z" fill="url(#steel)" stroke="#1B2330" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M5,-34 L5,-78" stroke="#FFFFFF" stroke-width="1.4" opacity="0.75"/>
      <path d="M5,-79 L7.4,-97" stroke="#FFFFFF" stroke-width="1.2" opacity="0.6"/>
      <path d="M12.4,-34 L12.4,-85" stroke="#1B2330" stroke-width="1" opacity="0.16"/>
      <path d="M4.4,-80 L13.6,-86" stroke="#1B2330" stroke-width="1" opacity="0.28"/>
      
      <!-- Pommel -->
      <polygon points="9,-118 15,-111 9,-104 3,-111" fill="url(#goldG)" stroke="#1B2330" stroke-width="1.2"/>
    </g>

    <!-- Cutting light beam / laser line (represented as glow effect) -->
    <line x1="9" y1="-125" x2="9" y2="40" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="9" cy="-125" r="5" fill="#FCD34D" opacity="0.8">
      <animate attributeName="r" values="4;7;4" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
