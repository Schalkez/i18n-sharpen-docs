<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" width="100%" height="100%" role="img" aria-label="i18n-sharpen before and after translation sync and prune flow">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#21262D" stroke-width="0.8" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#070A0F"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Glowing background blobs -->
  <circle cx="120" cy="190" r="130" fill="url(#amber-glow)" filter="blur(35px)" />
  <circle cx="440" cy="190" r="130" fill="url(#green-glow)" filter="blur(35px)" />

  <!-- LEFT PANEL: Code Editor (Before/Source) -->
  <g transform="translate(20, 25)">
    <!-- Shadow & Glow -->
    <rect x="-1" y="-1" width="237" height="332" rx="10" fill="none" stroke="#30363D" stroke-width="1.5"/>
    <rect width="235" height="330" rx="9" fill="url(#panel-bg)" stroke="#111827" stroke-width="1"/>
    
    <!-- Window Header -->
    <circle cx="16" cy="16" r="4" fill="#FF5F56"/>
    <circle cx="26" cy="16" r="4" fill="#FFBD2E"/>
    <circle cx="36" cy="16" r="4" fill="#27C93F"/>
    <text x="125" y="20" fill="#8B949E" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5">App.tsx</text>
    
    <!-- Editor Code -->
    <g transform="translate(15, 48)" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11.5" line-height="1.6">
      <text x="0" y="15"><tspan fill="#FF7B72">const</tspan> <tspan fill="#79C0FF">Hero</tspan> <tspan fill="#FF7B72">=</tspan> <tspan fill="#C9D1D9">()</tspan> <tspan fill="#FF7B72">=&gt;</tspan> <tspan fill="#C9D1D9">{</tspan></text>
      <text x="12" y="38" fill="#8B949E">// 1. Active translation keys</text>
      
      <!-- Key 1 -->
      <text x="12" y="60"><tspan fill="#79C0FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#A5D6FF">"hero.title"</tspan><tspan fill="#C9D1D9">)</tspan></text>
      
      <!-- Key 2 -->
      <text x="12" y="82"><tspan fill="#79C0FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#A5D6FF">"hero.subtitle"</tspan><tspan fill="#C9D1D9">)</tspan></text>
      
      <!-- Newly added Key (Highlighted as Before-Extract) -->
      <rect x="8" y="94" width="200" height="20" fill="#F59E0B" fill-opacity="0.12" rx="4" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
      <text x="12" y="108" font-weight="600"><tspan fill="#79C0FF">t</tspan><tspan fill="#C9D1D9">(</tspan><tspan fill="#F59E0B">"hero.new_button"</tspan><tspan fill="#C9D1D9">)</tspan></text>
      
      <text x="12" y="135" fill="#8B949E" opacity="0.8">// 2. Untranslated string warning</text>
      <!-- Hardcoded warning -->
      <rect x="8" y="145" width="200" height="20" fill="#EF4444" fill-opacity="0.08" rx="4" stroke="#F85149" stroke-opacity="0.2" stroke-width="1"/>
      <text x="12" y="159"><tspan fill="#79C0FF">&lt;</tspan><tspan fill="#7EE787">span</tspan><tspan fill="#79C0FF">&gt;</tspan><tspan fill="#F85149">Submit</tspan><tspan fill="#79C0FF">&lt;/</tspan><tspan fill="#7EE787">span</tspan><tspan fill="#79C0FF">&gt;</tspan></text>

      <text x="0" y="200" fill="#C9D1D9">};</text>
    </g>

    <!-- Source Label -->
    <rect x="15" y="285" width="85" height="20" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
    <text x="57.5" y="298" fill="#8B949E" font-family="-apple-system, sans-serif" font-size="9.5" font-weight="600" text-anchor="middle">SOURCE CODE</text>
  </g>

  <!-- MIDDLE PIPELINE (Clean, modern indicators replacing the knife) -->
  <g transform="translate(255, 25)">
    <!-- Vertical timeline/sync track -->
    <line x1="25" y1="50" x2="25" y2="280" stroke="#21262D" stroke-width="2" stroke-dasharray="4,4"/>
    
    <!-- Sync indicator -->
    <g transform="translate(0, 95)">
      <circle cx="25" cy="15" r="16" fill="#0D1117" stroke="#10B981" stroke-width="1.5"/>
      <path d="M 21,15 L 29,15 M 26,11 L 30,15 L 26,19" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="25" y="-6" fill="#10B981" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold" text-anchor="middle">SYNC</text>
    </g>

    <!-- Prune indicator -->
    <g transform="translate(0, 185)">
      <circle cx="25" cy="15" r="16" fill="#0D1117" stroke="#EF4444" stroke-width="1.5"/>
      <path d="M 20,15 L 30,15" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
      <text x="25" y="-6" fill="#EF4444" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold" text-anchor="middle">PRUNE</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Locale JSON (After/Output) -->
  <g transform="translate(305, 25)">
    <!-- Shadow & Glow -->
    <rect x="-1" y="-1" width="237" height="332" rx="10" fill="none" stroke="#30363D" stroke-width="1.5"/>
    <rect width="235" height="330" rx="9" fill="url(#panel-bg)" stroke="#111827" stroke-width="1"/>
    
    <!-- Window Header -->
    <circle cx="16" cy="16" r="4" fill="#444D56" opacity="0.5"/>
    <circle cx="26" cy="16" r="4" fill="#444D56" opacity="0.5"/>
    <circle cx="36" cy="16" r="4" fill="#444D56" opacity="0.5"/>
    <text x="125" y="20" fill="#8B949E" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5">en.json</text>
    
    <!-- JSON Content -->
    <g transform="translate(15, 48)" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11.5" line-height="1.6">
      <text x="0" y="15" fill="#FF7B72">{</text>
      
      <!-- Existing keys -->
      <text x="12" y="38"><tspan fill="#79C0FF">"hero.title"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"Welcome"</tspan><tspan fill="#C9D1D9">,</tspan></text>
      <text x="12" y="60"><tspan fill="#79C0FF">"hero.subtitle"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"Linter..."</tspan><tspan fill="#C9D1D9">,</tspan></text>
      
      <!-- Synced Key (Green highlight & plus) -->
      <g>
        <rect x="8" y="72" width="204" height="20" fill="#10B981" fill-opacity="0.12" rx="4" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
        <text x="12" y="86" font-weight="600"><tspan fill="#34D399">"hero.new_button"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"hero.new_button"</tspan></text>
        <text x="198" y="86" fill="#34D399" font-weight="bold" font-size="10">+</text>
      </g>
      
      <!-- Unused Key Pruned (Red highlight, strike-through, and minus) -->
      <g transform="translate(0, 50)">
        <rect x="8" y="72" width="204" height="20" fill="#EF4444" fill-opacity="0.1" rx="4" stroke="#EF4444" stroke-opacity="0.2" stroke-width="1"/>
        <text x="12" y="86" fill="#8B949E" text-decoration="line-through" opacity="0.6"><tspan fill="#F85149">"obsolete.old_key"</tspan><tspan fill="#C9D1D9">: </tspan><tspan fill="#A5D6FF">"value"</tspan></text>
        <text x="198" y="86" fill="#F85149" font-weight="bold" font-size="11">-</text>
      </g>

      <text x="12" y="165" fill="#8B949E" opacity="0.5">...</text>
      <text x="0" y="200" fill="#FF7B72">}</text>
    </g>

    <!-- Output Label -->
    <rect x="15" y="285" width="85" height="20" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
    <text x="57.5" y="298" fill="#8B949E" font-family="-apple-system, sans-serif" font-size="9.5" font-weight="600" text-anchor="middle">LOCALE JSON</text>
  </g>
</svg>
